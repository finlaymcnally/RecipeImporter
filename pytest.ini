[pytest]
addopts = -q --tb=no --assert=plain --show-capture=no --strict-markers --disable-warnings --no-summary
console_output_style = classic
testpaths = tests
markers =
    analytics: analytics and dashboard tests
    bench: benchmark pipeline and scoring tests
    cli: command wiring and interactive flow tests
    core: shared model and utility tests
    ingestion: importer and extraction tests
    labelstudio: Label Studio import/export/prelabel tests
    llm: LLM and codex-farm integration tests
    parsing: text parsing and normalization tests
    slow: higher-cost suites for focused runs
    smoke: tiny sanity suite for quick verification
    staging: staging/output contract tests
