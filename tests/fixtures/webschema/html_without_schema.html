<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Skillet Zucchini</title>
  </head>
  <body>
    <article>
      <h1>Skillet Zucchini</h1>
      <p>Simple stovetop side dish.</p>

      <h2>Ingredients</h2>
      <ul>
        <li>2 zucchini, sliced</li>
        <li>1 tbsp olive oil</li>
        <li>1 tsp kosher salt</li>
      </ul>

      <h2>Instructions</h2>
      <ol>
        <li>Heat oil in a skillet over medium heat.</li>
        <li>Add zucchini and salt, then saute until tender.</li>
        <li>Serve immediately.</li>
      </ol>
    </article>
  </body>
</html>
